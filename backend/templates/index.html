<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Forecasting Lab API</title>
    <style>
        :root {
            --bg-color: #0d0c0a;
            --card-bg: rgba(20, 18, 15, 0.6);
            --border-color: rgba(139, 90, 43, 0.2);
            --gold-primary: #cba89a;
            --gold-dark: #8b5a2b;
            --text-color: #fdfbf7;
            --text-muted: #a39589;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .api-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #4caf50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 12px #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }

        .status-pill {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--gold-primary);
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 30px 0;
        }

        .endpoints {
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            text-align: left;
        }

        .endpoints h3 {
            color: var(--gold-primary);
            font-size: 0.9rem;
            margin: 0 0 12px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .endpoint-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            background: rgba(139, 90, 43, 0.05);
            border: 1px solid rgba(139, 90, 43, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .method {
            color: var(--gold-dark);
            font-weight: bold;
        }

        .path {
            color: var(--text-color);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="api-card">
        <div class="status-pill">
            <span class="status-dot"></span>
            Operational
        </div>
        <h1>Fashion Forecasting Lab API</h1>
        <p>The predictive analytical backend engine is running. Use the premium Next.js client interface to perform searches and render forecast dashboards.</p>
        
        <div class="endpoints">
            <h3>Active Endpoints</h3>
            <div class="endpoint-item">
                <span class="path">/api/forecast</span>
                <span class="method">POST</span>
            </div>
            <div class="endpoint-item">
                <span class="path">/</span>
                <span class="method">GET</span>
            </div>
        </div>
    </div>
</body>
</html>
